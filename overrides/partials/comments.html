
<div id="__comments-container">
  <h2 id="__comments">{{ lang.t("meta.comments") }}</h2>
  <!-- Insert generated snippet here -->
</div>
<script>
  (function() {
    // Giscus is only enabled on the production domain; preview deployments
    // (e.g. preview.fedramp.gov) share this same build and must not show it.
    var allowedHosts = ["fedramp.gov", "www.fedramp.gov"]
    if (allowedHosts.indexOf(window.location.hostname) === -1) {
      var container = document.getElementById("__comments-container")
      if (container) {
        container.style.display = "none"
      }
      return
    }

    var giscus = document.createElement("script")
    giscus.src = "https://giscus.app/client.js"
    giscus.setAttribute("data-repo", "FedRAMP/2026")
    giscus.setAttribute("data-repo-id", "R_kgDORpyFmQ")
    giscus.setAttribute("data-category", "Page Discussion")
    giscus.setAttribute("data-category-id", "DIC_kwDORpyFmc4C77Oi")
    giscus.setAttribute("data-mapping", "pathname")
    giscus.setAttribute("data-strict", "0")
    giscus.setAttribute("data-reactions-enabled", "1")
    giscus.setAttribute("data-emit-metadata", "0")
    giscus.setAttribute("data-input-position", "top")
    giscus.setAttribute("data-theme", "preferred_color_scheme")
    giscus.setAttribute("data-lang", "en")
    giscus.setAttribute("data-loading", "lazy")
    giscus.crossOrigin = "anonymous"
    giscus.async = true

    // Set palette on initial load
    var palette = __md_get("__palette")
    if (palette && typeof palette.color === "object") {
      var theme = palette.color.scheme === "slate"
        ? "transparent_dark"
        : "light"

      // Instruct Giscus to set theme
      giscus.setAttribute("data-theme", theme)
    }

    document.getElementById("__comments-container").appendChild(giscus)

    // Synchronize Giscus theme with palette
    // Register event handlers after documented loaded
    document.addEventListener("DOMContentLoaded", function() {
      var ref = document.querySelector("[data-md-component=palette]")
      ref.addEventListener("change", function() {
        var palette = __md_get("__palette")
        if (palette && typeof palette.color === "object") {
          var theme = palette.color.scheme === "slate"
            ? "transparent_dark"
            : "light"

          // Instruct Giscus to change theme
          var frame = document.querySelector(".giscus-frame")
          frame.contentWindow.postMessage(
            { giscus: { setConfig: { theme } } },
            "https://giscus.app"
          )
        }
      })
    })
  })()
</script>
