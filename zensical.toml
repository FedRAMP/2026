site_name = "FedRAMP Consolidated Rules for 2026"
site_description = "A description."
site_author = "pete@fedramp.gov"
site_dir = "html/"
docs_dir = "markdown/"
site_url = "https://fedramp.gov/26/"
repo_url = "https://github.com/fedramp/consolidated-rules-2026"
repo_name = "FedRAMP/consolidated-rules-2026"
extra_css = ["stylesheets/custom.css"]
copyright = "fedramp.gov"

[project.extra]
homepage = "/2026"
generator = false

[project.extra.tags]
Rev5 = "rev5"
20x = "20x"

[project.theme]
custom_dir = "overrides"
logo = "assets/fr-only-logo-black.png"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.top",
    "navigation.tracking",
    # "navigation.tabs",
    #"navigation.expand",
    "navigation.path",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.icon.tag]
rev5 = "material/numeric-5-circle-outline"
20x = "material/alpha-x-circle-outline"

[project.theme.icon.admonition]
abstract = "fontawesome/solid/gavel"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
